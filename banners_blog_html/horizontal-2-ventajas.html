<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furgocasa · Banner blog horizontal · Ventajas</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&family=Amiko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Amiko', sans-serif;
    background: #f4f4f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .preview-label {
    font-family: 'Rubik', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6b7280;
    margin-bottom: 14px;
  }

  /* =========================================================
     BANNER HORIZONTAL · VENTAJAS / SPLIT
     Tamaño objetivo: 960 × 280 (ratio ~24:7)
     Layout split: texto · imagen
     ========================================================= */
  .fc-banner-hsplit {
    position: relative;
    display: flex;
    width: 100%;
    max-width: 960px;
    min-height: 230px;
    aspect-ratio: 16 / 5;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(6, 57, 113, 0.18);
    background: #ffffff;
    text-decoration: none;
  }

  .fc-banner-hsplit__text {
    flex: 0 0 56%;
    background: linear-gradient(135deg, #063971 0%, #0a4d8e 60%, #1166b8 100%);
    color: #ffffff;
    padding: 20px 26px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Decoración geométrica de fondo */
  .fc-banner-hsplit__text::before {
    content: "";
    position: absolute;
    top: -40%;
    right: -10%;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.18) 0%, transparent 70%);
    border-radius: 50%;
  }
  .fc-banner-hsplit__text::after {
    content: "";
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(214, 90, 49, 0.18) 0%, transparent 70%);
    border-radius: 50%;
  }

  .fc-banner-hsplit__inner {
    position: relative;
    z-index: 1;
  }

  .fc-banner-hsplit__brand {
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #FBBF24;
    margin-bottom: 8px;
  }

  .fc-banner-hsplit__title {
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: clamp(1.1rem, 2.3vw, 1.75rem);
    line-height: 1.15;
    color: #ffffff;
    margin-bottom: 6px;
  }

  .fc-banner-hsplit__subtitle {
    font-family: 'Amiko', sans-serif;
    font-weight: 600;
    font-size: clamp(0.78rem, 1.3vw, 0.95rem);
    line-height: 1.3;
    color: #ffffff;
    margin-bottom: 10px;
  }

  .fc-banner-hsplit__features {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
    margin-bottom: 12px;
  }
  .fc-banner-hsplit__feature {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Amiko', sans-serif;
    font-size: 0.72rem;
    color: #ffffff;
    font-weight: 600;
  }
  .fc-banner-hsplit__feature::before {
    content: "✓";
    color: #FBBF24;
    font-weight: 900;
    font-size: 0.85rem;
  }

  .fc-banner-hsplit__cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    font-family: 'Rubik', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    color: #063971;
    background: #FBBF24;
    padding: 9px 18px;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(251, 191, 36, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    width: fit-content;
  }
  .fc-banner-hsplit__cta::after {
    content: "→";
    font-size: 1.1rem;
    transition: transform 0.2s ease;
  }
  .fc-banner-hsplit:hover .fc-banner-hsplit__cta {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(251, 191, 36, 0.5);
  }
  .fc-banner-hsplit:hover .fc-banner-hsplit__cta::after {
    transform: translateX(3px);
  }

  .fc-banner-hsplit__img-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .fc-banner-hsplit__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  /* Difuminado en el borde izquierdo para integrar con el bloque azul */
  .fc-banner-hsplit__img-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 60px;
    height: 100%;
    background: linear-gradient(90deg, rgba(6, 57, 113, 0.55) 0%, transparent 100%);
    z-index: 1;
  }

  /* Responsive · pantallas estrechas */
  @media (max-width: 640px) {
    .fc-banner-hsplit {
      flex-direction: column;
      aspect-ratio: auto;
      min-height: 0;
    }
    .fc-banner-hsplit__text {
      flex: none;
      padding: 22px 22px 24px;
      order: 2;
    }
    .fc-banner-hsplit__img-wrap {
      order: 1;
      width: 100%;
      height: 160px;
      flex: none;
    }
    .fc-banner-hsplit__img-wrap::before {
      width: 100%;
      height: 50px;
      top: auto; bottom: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(6, 57, 113, 0.6) 100%);
    }
  }
</style>
</head>
<body>

  <div class="preview-label">Banner horizontal · Ventajas · 960 × 280</div>

  <!-- ====== BANNER (esto es lo único que se inserta en el blog) ====== -->
  <a class="fc-banner-hsplit" href="https://www.furgocasa.com/campers" aria-label="Descubre la flota de campers Furgocasa">

    <div class="fc-banner-hsplit__text">
      <div class="fc-banner-hsplit__inner">
        <div class="fc-banner-hsplit__brand">Furgocasa · Murcia</div>
        <h3 class="fc-banner-hsplit__title">
          Tu camper lista para salir, sin sorpresas
        </h3>
        <p class="fc-banner-hsplit__subtitle">
          Modelos modernos totalmente equipados y al alquilarlos con nosotros tendrás:
        </p>
        <div class="fc-banner-hsplit__features">
          <span class="fc-banner-hsplit__feature">Kilometraje ilimitado</span>
          <span class="fc-banner-hsplit__feature">Seguro a todo riesgo</span>
          <span class="fc-banner-hsplit__feature">Reserva en 2 minutos</span>
        </div>
        <span class="fc-banner-hsplit__cta">Ver nuestra flota</span>
      </div>
    </div>

    <div class="fc-banner-hsplit__img-wrap">
      <img
        class="fc-banner-hsplit__img"
        src="../public/images/mailing/vehicles/fu0016-challenger-v114-max.jpg"
        alt="Camper Challenger V114 Max de la flota Furgocasa">
    </div>

  </a>
  <!-- ====== / BANNER ====== -->

</body>
</html>
