<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furgocasa · Banner blog vertical · Momentos</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&family=Amiko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Amiko', sans-serif;
    background: #f4f4f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .preview-label {
    font-family: 'Rubik', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6b7280;
    margin-bottom: 14px;
  }

  .fc-banner-v2 {
    position: relative;
    width: 100%;
    max-width: 320px;
    aspect-ratio: 1 / 2;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 14px 50px rgba(6, 57, 113, 0.25);
    isolation: isolate;
    background: #063971;
    text-decoration: none;
    display: block;
  }

  .fc-banner-v2__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    z-index: 1;
    transition: transform 0.6s ease;
  }
  .fc-banner-v2:hover .fc-banner-v2__img {
    transform: scale(1.04);
  }

  .fc-banner-v2__overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(214, 90, 49, 0.25) 0%,
        rgba(6, 57, 113, 0.10) 25%,
        rgba(6, 57, 113, 0.15) 50%,
        rgba(6, 57, 113, 0.80) 80%,
        rgba(6, 57, 113, 0.95) 100%);
    z-index: 2;
  }

  .fc-banner-v2__brand {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 3;
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.9);
    background: rgba(0, 0, 0, 0.3);
    padding: 4px 10px;
    border-radius: 14px;
    backdrop-filter: blur(4px);
  }

  .fc-banner-v2__content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    padding: 24px 22px 26px;
    color: #ffffff;
    text-align: center;
  }

  .fc-banner-v2__quote {
    font-family: 'Amiko', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    color: #FBBF24;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .fc-banner-v2__title {
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 1.55rem;
    line-height: 1.1;
    color: #ffffff;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }
  .fc-banner-v2__title span {
    color: #FBBF24;
    display: block;
  }

  .fc-banner-v2__subtitle {
    font-family: 'Amiko', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    line-height: 1.4;
    color: #cfe1f8;
    margin-bottom: 18px;
  }

  .fc-banner-v2__cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    font-family: 'Rubik', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: #063971;
    background: #FBBF24;
    padding: 13px 20px;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(251, 191, 36, 0.45);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .fc-banner-v2__cta::after {
    content: "→";
    font-size: 1.1rem;
    transition: transform 0.2s ease;
  }
  .fc-banner-v2:hover .fc-banner-v2__cta {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(251, 191, 36, 0.55);
  }
  .fc-banner-v2:hover .fc-banner-v2__cta::after {
    transform: translateX(3px);
  }

  .fc-banner-v2::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: inherit;
    pointer-events: none;
    z-index: 4;
  }
</style>
</head>
<body>

  <div class="preview-label">Banner vertical · Momentos · 320 × 640</div>

  <a class="fc-banner-v2" href="https://www.furgocasa.com/campers" aria-label="Descubre las campers Furgocasa">
    <img
      class="fc-banner-v2__img"
      src="../public/images/mailing/storytellers/showcase-sunset-couple.jpg"
      alt="Pareja disfrutando del atardecer junto a su camper Furgocasa">

    <div class="fc-banner-v2__overlay"></div>
    <span class="fc-banner-v2__brand">Furgocasa</span>

    <div class="fc-banner-v2__content">
      <div class="fc-banner-v2__quote">Para recordar siempre</div>
      <h3 class="fc-banner-v2__title">
        Los mejores momentos
        <span>se viven en camper</span>
      </h3>
      <p class="fc-banner-v2__subtitle">
        Atardeceres, risas y carreteras sin fin. Alquila tu camper y crea tu historia.
      </p>
      <span class="fc-banner-v2__cta">Elige tu camper</span>
    </div>
  </a>

</body>
</html>
