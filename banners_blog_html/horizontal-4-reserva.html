<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furgocasa · Banner blog horizontal · Reserva fácil</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&family=Amiko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Amiko', sans-serif;
    background: #f4f4f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .preview-label {
    font-family: 'Rubik', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6b7280;
    margin-bottom: 14px;
  }

  .fc-banner-hsplit2 {
    position: relative;
    display: flex;
    flex-direction: row-reverse;
    width: 100%;
    max-width: 960px;
    min-height: 260px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(6, 57, 113, 0.18);
    background: #ffffff;
    text-decoration: none;
  }

  .fc-banner-hsplit2__text {
    flex: 0 0 54%;
    background: linear-gradient(135deg, #D65A31 0%, #b8451f 60%, #8a3215 100%);
    color: #ffffff;
    padding: 22px 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .fc-banner-hsplit2__text::before {
    content: "";
    position: absolute;
    top: -30%;
    left: -15%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .fc-banner-hsplit2__text::after {
    content: "";
    position: absolute;
    bottom: -25%;
    right: -10%;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .fc-banner-hsplit2__inner {
    position: relative;
    z-index: 1;
  }

  .fc-banner-hsplit2__brand {
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #FBBF24;
    margin-bottom: 8px;
  }

  .fc-banner-hsplit2__title {
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: clamp(1.1rem, 2.3vw, 1.75rem);
    line-height: 1.15;
    color: #ffffff;
    margin-bottom: 6px;
  }
  .fc-banner-hsplit2__title span {
    color: #FBBF24;
  }

  .fc-banner-hsplit2__subtitle {
    font-family: 'Amiko', sans-serif;
    font-weight: 600;
    font-size: clamp(0.78rem, 1.3vw, 0.95rem);
    line-height: 1.3;
    color: #ffffff;
    margin-bottom: 12px;
  }

  .fc-banner-hsplit2__steps {
    display: flex;
    gap: 16px;
    margin-bottom: 14px;
  }
  .fc-banner-hsplit2__step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .fc-banner-hsplit2__step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: #FBBF24;
    color: #8a3215;
    border-radius: 50%;
    font-family: 'Rubik', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .fc-banner-hsplit2__step-label {
    font-family: 'Amiko', sans-serif;
    font-size: 0.68rem;
    color: #ffffff;
    font-weight: 600;
    line-height: 1.2;
  }

  .fc-banner-hsplit2__cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    font-family: 'Rubik', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    color: #D65A31;
    background: #ffffff;
    padding: 10px 20px;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    width: fit-content;
  }
  .fc-banner-hsplit2__cta::after {
    content: "→";
    font-size: 1.1rem;
    transition: transform 0.2s ease;
  }
  .fc-banner-hsplit2:hover .fc-banner-hsplit2__cta {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
  }
  .fc-banner-hsplit2:hover .fc-banner-hsplit2__cta::after {
    transform: translateX(3px);
  }

  .fc-banner-hsplit2__img-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .fc-banner-hsplit2__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .fc-banner-hsplit2__img-wrap::after {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 60px;
    height: 100%;
    background: linear-gradient(270deg, rgba(214, 90, 49, 0.5) 0%, transparent 100%);
    z-index: 1;
  }

  @media (max-width: 640px) {
    .fc-banner-hsplit2 {
      flex-direction: column;
      min-height: 0;
    }
    .fc-banner-hsplit2__text {
      flex: none;
      padding: 22px;
      order: 2;
    }
    .fc-banner-hsplit2__img-wrap {
      order: 1;
      width: 100%;
      height: 180px;
      flex: none;
    }
    .fc-banner-hsplit2__img-wrap::after {
      width: 100%;
      height: 50px;
      top: auto; bottom: 0; right: auto;
      background: linear-gradient(180deg, transparent 0%, rgba(214, 90, 49, 0.5) 100%);
    }
    .fc-banner-hsplit2__steps { gap: 12px; }
  }
</style>
</head>
<body>

  <div class="preview-label">Banner horizontal · Reserva fácil · 960 × 260</div>

  <a class="fc-banner-hsplit2" href="https://www.furgocasa.com/campers" aria-label="Reserva tu camper Furgocasa">

    <div class="fc-banner-hsplit2__text">
      <div class="fc-banner-hsplit2__inner">
        <div class="fc-banner-hsplit2__brand">Furgocasa · Murcia</div>
        <h3 class="fc-banner-hsplit2__title">
          Reserva tu camper <span>en 2 minutos</span>
        </h3>
        <p class="fc-banner-hsplit2__subtitle">
          Busca tus fechas, elige tu camper y confirma tu reserva directamente desde la web.
        </p>
        <div class="fc-banner-hsplit2__steps">
          <div class="fc-banner-hsplit2__step">
            <span class="fc-banner-hsplit2__step-num">1</span>
            <span class="fc-banner-hsplit2__step-label">Elige fechas</span>
          </div>
          <div class="fc-banner-hsplit2__step">
            <span class="fc-banner-hsplit2__step-num">2</span>
            <span class="fc-banner-hsplit2__step-label">Elige camper</span>
          </div>
          <div class="fc-banner-hsplit2__step">
            <span class="fc-banner-hsplit2__step-num">3</span>
            <span class="fc-banner-hsplit2__step-label">¡A rodar!</span>
          </div>
        </div>
        <span class="fc-banner-hsplit2__cta">Reservar ahora</span>
      </div>
    </div>

    <div class="fc-banner-hsplit2__img-wrap">
      <img
        class="fc-banner-hsplit2__img"
        src="../public/images/mailing/vehicles/fu0012-knaus-boxstar-family.jpg"
        alt="Camper Knaus Boxstar Family de la flota Furgocasa">
    </div>

  </a>

</body>
</html>
