<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furgocasa · Banner blog vertical · Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800;900&family=Amiko:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Amiko', sans-serif;
    background: #f4f4f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .preview-label {
    font-family: 'Rubik', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #6b7280;
    margin-bottom: 14px;
  }

  /* =========================================================
     BANNER VERTICAL · OFERTAS · IMAGEN FULL + OVERLAY
     Tamaño objetivo: 320 × 640 (ratio 1:2)
     Recomendado para sidebar / columna lateral del blog
     ========================================================= */
  .fc-banner-v {
    position: relative;
    width: 100%;
    max-width: 320px;
    aspect-ratio: 1 / 2;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 14px 50px rgba(6, 57, 113, 0.25);
    isolation: isolate;
    background: #063971;
    text-decoration: none;
    display: block;
  }

  .fc-banner-v__img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 65% center;
    z-index: 1;
    transition: transform 0.6s ease;
  }
  .fc-banner-v:hover .fc-banner-v__img {
    transform: scale(1.04);
  }

  /* Doble overlay: degradado vertical + tinte azul */
  .fc-banner-v__overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(6, 57, 113, 0.55) 0%,
        rgba(6, 57, 113, 0.20) 30%,
        rgba(6, 57, 113, 0.20) 50%,
        rgba(6, 57, 113, 0.85) 85%,
        rgba(6, 57, 113, 0.95) 100%);
    z-index: 2;
  }

  /* Etiqueta superior (alineada a la izquierda para no solapar con la marca) */
  .fc-banner-v__tag {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Rubik', sans-serif;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #063971;
    background: #FBBF24;
    padding: 6px 12px;
    border-radius: 20px;
    box-shadow: 0 4px 14px rgba(251, 191, 36, 0.4);
    white-space: nowrap;
  }
  .fc-banner-v__tag::before {
    content: "★";
    font-size: 0.75rem;
  }

  /* Marca discreta */
  .fc-banner-v__brand {
    position: absolute;
    top: 18px;
    right: 16px;
    z-index: 3;
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.9);
    background: rgba(0, 0, 0, 0.3);
    padding: 5px 10px;
    border-radius: 14px;
    backdrop-filter: blur(4px);
  }

  /* Contenido principal abajo */
  .fc-banner-v__content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    padding: 24px 22px 26px;
    color: #ffffff;
    text-align: center;
  }

  .fc-banner-v__title {
    font-family: 'Rubik', sans-serif;
    font-weight: 800;
    font-size: 1.55rem;
    line-height: 1.1;
    color: #ffffff;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }
  .fc-banner-v__title span {
    color: #FBBF24;
    display: block;
  }

  .fc-banner-v__subtitle {
    font-family: 'Amiko', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    line-height: 1.4;
    color: #cfe1f8;
    margin-bottom: 18px;
  }

  .fc-banner-v__cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    font-family: 'Rubik', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: #ffffff;
    background: linear-gradient(135deg, #D65A31 0%, #b8451f 100%);
    padding: 13px 20px;
    border-radius: 30px;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(214, 90, 49, 0.45);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    letter-spacing: 0.5px;
  }
  .fc-banner-v__cta::after {
    content: "→";
    font-size: 1.1rem;
    transition: transform 0.2s ease;
  }
  .fc-banner-v:hover .fc-banner-v__cta {
    transform: translateY(-2px);
    box-shadow: 0 10px 24px rgba(214, 90, 49, 0.55);
  }
  .fc-banner-v:hover .fc-banner-v__cta::after {
    transform: translateX(3px);
  }

  /* Detalle de borde decorativo */
  .fc-banner-v::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: inherit;
    pointer-events: none;
    z-index: 4;
  }
</style>
</head>
<body>

  <div class="preview-label">Banner vertical · Ofertas · 320 × 640</div>

  <!-- ====== BANNER (esto es lo único que se inserta en el blog) ====== -->
  <a class="fc-banner-v" href="https://www.furgocasa.com/ofertas" aria-label="Ver ofertas Furgocasa">
    <img
      class="fc-banner-v__img"
      src="../public/images/mailing/storytellers/showcase-hero.jpg"
      alt="Disfruta del atardecer desde tu camper Furgocasa">

    <div class="fc-banner-v__overlay"></div>

    <span class="fc-banner-v__tag">Ofertas activas</span>
    <span class="fc-banner-v__brand">Furgocasa</span>

    <div class="fc-banner-v__content">
      <h3 class="fc-banner-v__title">
        Tu próxima aventura
        <span>al mejor precio</span>
      </h3>
      <p class="fc-banner-v__subtitle">
        Huecos entre reservas con descuentos exclusivos en campers totalmente equipadas.
      </p>
      <span class="fc-banner-v__cta">Ver ofertas</span>
    </div>
  </a>
  <!-- ====== / BANNER ====== -->

</body>
</html>
